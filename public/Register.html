<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CouponVault — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-blob blob1"></div>
    <div class="auth-blob blob2"></div>
    <div class="auth-blob blob3"></div>
  </div>

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-mark">🏷️</div>
      <span class="logo-text">Coupon<strong>Vault</strong></span>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Start organising your coupons today</p>

    <div id="auth-error" class="auth-error" style="display:none"></div>

    <div class="field-group">
      <label>Full Name</label>
      <input id="r-name" type="text" placeholder="Enter your name" autocomplete="name"/>
    </div>

    <div class="field-group">
      <label>Username</label>
      <input id="r-user" type="text" placeholder="Choose a username" autocomplete="username"/>
    </div>

    <div class="field-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="r-pass" type="password" placeholder="Choose a password (min 4 chars)" autocomplete="new-password"/>
        <button class="pw-toggle" onclick="togglePw('r-pass')" type="button">👁</button>
      </div>
    </div>

    <div class="field-group">
      <label>Confirm Password</label>
      <div class="pw-wrap">
        <input id="r-pass2" type="password" placeholder="Repeat your password" autocomplete="new-password"/>
        <button class="pw-toggle" onclick="togglePw('r-pass2')" type="button">👁</button>
      </div>
    </div>

    <!-- Password strength bar -->
    <div class="strength-wrap" id="strength-wrap" style="display:none">
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill"></div>
      </div>
      <span class="strength-label" id="strength-label"></span>
    </div>

    <button class="btn-auth" onclick="doRegister()">Create Account →</button>

    <p class="auth-hint">Already have an account? <a href="login.html">Sign in</a></p>

  </div>

  <script>
    if (sessionStorage.getItem('cv_user')) location.href = 'index.html';

    // Password strength indicator
    document.getElementById('r-pass').addEventListener('input', function () {
      const val  = this.value;
      const wrap = document.getElementById('strength-wrap');
      const fill = document.getElementById('strength-fill');
      const lbl  = document.getElementById('strength-label');

      if (!val) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'flex';

      let score = 0;
      if (val.length >= 6)              score++;
      if (val.length >= 10)             score++;
      if (/[A-Z]/.test(val))            score++;
      if (/[0-9]/.test(val))            score++;
      if (/[^A-Za-z0-9]/.test(val))     score++;

      const levels = [
        { label: 'Very weak', color: '#ef4444', width: '20%' },
        { label: 'Weak',      color: '#f97316', width: '40%' },
        { label: 'Fair',      color: '#f59e0b', width: '60%' },
        { label: 'Strong',    color: '#10b981', width: '80%' },
        { label: 'Very strong', color: '#059669', width: '100%' },
      ];
      const level = levels[Math.min(score, 4)];
      fill.style.width       = level.width;
      fill.style.background  = level.color;
      lbl.textContent        = level.label;
      lbl.style.color        = level.color;
    });

    function doRegister() {
      const name  = document.getElementById('r-name').value.trim();
      const user  = document.getElementById('r-user').value.trim();
      const pass  = document.getElementById('r-pass').value;
      const pass2 = document.getElementById('r-pass2').value;

      if (!name || !user || !pass || !pass2) return showError('Please fill in all fields.');
      if (pass.length < 4)   return showError('Password must be at least 4 characters.');
      if (pass !== pass2)    return showError('Passwords do not match.');
      if (user.length < 3)   return showError('Username must be at least 3 characters.');

      const users = JSON.parse(localStorage.getItem('cv_users') || '{}');
      if (users[user]) return showError('Username already taken. Try another.');

      users[user] = btoa(pass);
      localStorage.setItem('cv_users', JSON.stringify(users));

      // Redirect to login with success message
      location.href = 'login.html?registered=1';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3500);
    }

    function togglePw(id) {
      const inp = document.getElementById(id);
      inp.type  = inp.type === 'password' ? 'text' : 'password';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
