<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CouponVault — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-blob blob1"></div>
    <div class="auth-blob blob2"></div>
    <div class="auth-blob blob3"></div>
  </div>

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-mark">🏷️</div>
      <span class="logo-text">Coupon<strong>Vault</strong></span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your coupons</p>

    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div id="auth-success" class="auth-success" style="display:none"></div>

    <div class="field-group">
      <label>Username</label>
      <input id="l-user" type="text" placeholder="Enter your username" autocomplete="username"/>
    </div>

    <div class="field-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="l-pass" type="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>

    <button class="btn-auth" onclick="doLogin()">Sign In →</button>

    <p class="auth-hint">Don't have an account? <a href="register.html">Create one</a></p>

  </div>

  <script>
    if (sessionStorage.getItem('cv_user')) location.href = 'index.html';

    // Show success message if coming from register page
    const params = new URLSearchParams(location.search);
    if (params.get('registered')) {
      const el = document.getElementById('auth-success');
      el.textContent = '✅ Account created! Please sign in.';
      el.style.display = 'block';
    }

    function doLogin() {
      const user = document.getElementById('l-user').value.trim();
      const pass = document.getElementById('l-pass').value;

      if (!user || !pass) return showError('Please enter username and password.');

      const users = JSON.parse(localStorage.getItem('cv_users') || '{}');
      if (!users[user])             return showError('User not found. Please register first.');
      if (users[user] !== btoa(pass)) return showError('Incorrect password.');

      sessionStorage.setItem('cv_user', user);
      location.href = 'index.html';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function togglePw() {
      const inp = document.getElementById('l-pass');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
